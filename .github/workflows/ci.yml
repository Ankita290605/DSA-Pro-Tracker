name: CI Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Test Frontend Compilation
        run: npm run build --workspace=frontend

      - name: Test Backend Docker Build (Dry-Run)
        run: docker build -t dsa-backend-test ./backend

      - name: Test Frontend Docker Build (Dry-Run)
        run: docker build -t dsa-frontend-test ./frontend

  push-to-docker-hub:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and Push Backend to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/dsa-backend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/dsa-backend:${{ github.sha }}

      - name: Build and Push Frontend to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/dsa-frontend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/dsa-frontend:${{ github.sha }}
