name: CI Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Test Frontend Compilation
        run: npm run build --workspace=frontend

      - name: Test Backend Docker Build (Dry-Run)
        run: docker build -t dsa-backend-test ./backend

      - name: Test Frontend Docker Build (Dry-Run)
        run: docker build -t dsa-frontend-test ./frontend
