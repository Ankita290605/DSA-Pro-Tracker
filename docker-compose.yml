services:
  # ==========================================
  # Node.js Backend API Service
  # ==========================================
  backend:
    build:
      context: ./backend
    container_name: dsa_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - CLIENT_URL=http://localhost:3000
    volumes:
      - backend_data:/app/data

  # ==========================================
  # React Frontend Service
  # ==========================================
  frontend:
    build:
      context: ./frontend
    container_name: dsa_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

# ==========================================
# Named Volumes for Progress Cache Fallback
# ==========================================
volumes:
  backend_data:
